services:
  emulator:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    ports:
      - "4000:4000"   # Emulator UI  → http://localhost:4000
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
      - "9199:9199"   # Storage
    volumes:
      - emulator-data:/app/emulator-data

volumes:
  emulator-data:
